apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: resume-platform
data:
  OLLAMA_BASE_URL: "http://ollama:11434"
  AI_MODEL: "deepseek-r1:latest"
  EMBEDDING_MODEL: "nomic-embed-text"
  DB_URL: "jdbc:postgresql://postgres:5432/resumedb"
  DB_DRIVER: "org.postgresql.Driver"
  DB_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
  APP_RAG_ENABLED: "true"
  MULTIMODAL_SERVICE_URL: "http://multimodal-service:8070"
  PORT: "8050"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: resume-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ${REGISTRY}/resume-ai-backend:latest
          ports:
            - containerPort: 8050
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8050
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8050
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: resume-platform
spec:
  selector:
    app: backend
  ports:
    - port: 8050
      targetPort: 8050
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: resume-platform
type: Opaque
stringData:
  secret: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBITUFDLVNIQTI1NiBoYXNoaW5n
