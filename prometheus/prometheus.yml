global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'resume-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8050']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'resume-ai-backend'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
