spring.application.name=resume-ai
server.port=${PORT:8050}

# ── AI / OpenAI ──────────────────────────────────────────────
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-placeholder}
spring.ai.openai.chat.model=${AI_MODEL:gpt-4o-mini}
spring.ai.openai.embedding.model=${EMBEDDING_MODEL:text-embedding-3-small}

# ── RAG / Vector Store ────────────────────────────────────────
# Set APP_RAG_ENABLED=true in Docker/prod (requires PostgreSQL + pgvector)
app.rag.enabled=${APP_RAG_ENABLED:false}
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration

# ── Database (H2 default — works with zero setup) ────────────
spring.datasource.url=${DB_URL:jdbc:h2:mem:resumedb;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBITUFDLVNIQTI1NiBoYXNoaW5n}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Multimodal Python Service ─────────────────────────────────
multimodal.service.url=${MULTIMODAL_SERVICE_URL:http://localhost:8070}

# ── GitHub Token (optional, increases API rate limit) ─────────
github.token=${GITHUB_TOKEN:}

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
