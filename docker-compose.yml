version: "3.9"

services:

  # ── Ollama LLM runtime ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: resume-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # GPU support (uncomment if you have NVIDIA GPU + nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── PostgreSQL database (with pgvector extension) ───────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: resume-postgres
    environment:
      POSTGRES_DB: resumedb
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_user -d resumedb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Spring Boot backend ─────────────────────────────────────────
  backend:
    build:
      context: ./Resume/demo
      dockerfile: Dockerfile
    container_name: resume-backend
    ports:
      - "8050:8050"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      AI_MODEL: deepseek-r1:latest
      DB_URL: jdbc:postgresql://postgres:5432/resumedb
      DB_DRIVER: org.postgresql.Driver
      DB_USER: resume_user
      DB_PASSWORD: resume_pass
      DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBITUFDLVNIQTI1NiBoYXNoaW5n
      JWT_EXPIRATION: 86400000
      APP_RAG_ENABLED: "true"
      EMBEDDING_MODEL: nomic-embed-text
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  # ── React frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
