name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend: Maven build + tests ──────────────────────────────
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Resume/demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & test
        run: ./mvnw clean verify -Dspring.ai.ollama.chat.enabled=false
        env:
          DB_URL: jdbc:h2:mem:testdb
          DB_DRIVER: org.h2.Driver
          DB_USER: sa
          DB_PASSWORD: ""
          DB_DIALECT: org.hibernate.dialect.H2Dialect
          JWT_SECRET: dGVzdHNlY3JldGtleXRlc3RzZWNyZXRrZXl0ZXN0c2Vj

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-ai-jar
          path: Resume/demo/target/resume-ai.jar
          retention-days: 7

  # ── Frontend: npm build ────────────────────────────────────────
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Docker build + push to Docker Hub ─────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: resume-ai-jar
          path: Resume/demo/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Resume/demo
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/resume-ai-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/resume-ai-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/resume-ai-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/resume-ai-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push multimodal service image
        uses: docker/build-push-action@v5
        with:
          context: ./multimodal-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/resume-ai-multimodal:latest
            ${{ secrets.DOCKER_USERNAME }}/resume-ai-multimodal:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
